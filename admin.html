<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>
body{
    font-family:tahoma;
    background:#0f172a;
    color:#fff;
    margin:0;
}

.login-box, .panel{
    width:90%;
    max-width:500px;
    margin:50px auto;
    background:#111827;
    padding:20px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.order{
    background:#1f2937;
    margin:10px 0;
    padding:10px;
    border-radius:8px;
}

.status{
    color:#22c55e;
    font-weight:bold;
}

.del{
    background:red;
    margin-top:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<h2>🔐 Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" class="panel" style="display:none">

<h2>📊 لوحة التحكم</h2>

<div id="orders"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { 
getFirestore,
collection,
getDocs,
deleteDoc,
doc,
updateDoc 
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

import { 
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "arenatopup09.firebaseapp.com",
  projectId: "arenatopup09",
  storageBucket: "arenatopup09.appspot.com",
  messagingSenderId: "26967872918",
  appId: "1:26967872918:web:da333cb50f309922b579b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ===== LOGIN =====
window.login = async function(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,pass);
alert("تم الدخول");
loadOrders();
}catch(e){
alert("خطأ في البيانات");
}
}

// ===== CHECK AUTH =====
onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
loadOrders();
}
});

// ===== LOAD ORDERS =====
window.loadOrders = async function(){

let q = await getDocs(collection(db,"orders"));

let html="";

q.forEach((d)=>{

let data = d.data();

html+=`
<div class="order">
<p>🧾 ${JSON.stringify(data.items)}</p>
<p>📱 ID: ${data.playerID}</p>
<p>💳 ${data.payment}</p>
<p class="status">📦 ${data.status || "جديد"}</p>

<button onclick="updateStatus('${d.id}')">تحديث الحالة</button>
<button class="del" onclick="deleteOrder('${d.id}')">حذف</button>
</div>
`;
});

document.getElementById("orders").innerHTML=html;
}

// ===== DELETE =====
window.deleteOrder = async function(id){
await deleteDoc(doc(db,"orders",id));
loadOrders();
}

// ===== UPDATE STATUS =====
window.updateStatus = async function(id){
await updateDoc(doc(db,"orders",id),{
status:"تم التنفيذ"
});
loadOrders();
}

</script>

</body>
</html>
