<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard Pro</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#0f172a;
    color:#fff;
}

.container{
    width:95%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#111827;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
}

.row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.stat{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

button{
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.green{background:#22c55e;}
.red{background:red;}
.blue{background:#3b82f6;}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Admin Dashboard Pro</h2>

<div class="row">
<div class="stat">
<h3 id="ordersCount">0</h3>
<p>عدد الطلبات</p>
</div>

<div class="stat">
<h3 id="productsCount">0</h3>
<p>عدد المنتجات</p>
</div>

<div class="stat">
<h3 id="totalRevenue">0</h3>
<p>إجمالي الطلبات</p>
</div>
</div>

<!-- ADD PRODUCT -->
<div class="card">
<h3>➕ إضافة منتج</h3>

<input id="pname" placeholder="اسم المنتج">
<input id="pprice" placeholder="السعر">

<button class="green" onclick="addProduct()">إضافة</button>
</div>

<!-- PRODUCTS -->
<div class="card">
<h3>📦 المنتجات</h3>
<div id="products"></div>
</div>

<!-- ORDERS -->
<div class="card">
<h3>🧾 الطلبات</h3>
<div id="orders"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "arenatopup09.firebaseapp.com",
  projectId: "arenatopup09",
  storageBucket: "arenatopup09.appspot.com",
  messagingSenderId: "26967872918",
  appId: "1:26967872918:web:da333cb50f309922b579b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== LOAD DASHBOARD =====
async function load(){

// ORDERS
let ordersSnap = await getDocs(collection(db,"orders"));
let ordersCount = 0;
let revenue = 0;

let ordersHTML="";

ordersSnap.forEach(d=>{
let data=d.data();
ordersCount++;
revenue += data.total || 0;

ordersHTML+=`
<div class="card">
<p>📱 ${data.playerID}</p>
<p>💳 ${data.payment}</p>
<p>📦 ${data.status || "جديد"}</p>
<button class="red" onclick="delOrder('${d.id}')">حذف</button>
</div>
`;
});

// PRODUCTS
let productsSnap = await getDocs(collection(db,"products"));
let productsHTML="";

productsSnap.forEach(d=>{
let data=d.data();

productsHTML+=`
<div class="card">
<p>${data.name} - ${data.price}</p>
<button class="red" onclick="delProduct('${d.id}')">حذف</button>
</div>
`;
});

// UPDATE UI
document.getElementById("ordersCount").innerText=ordersCount;
document.getElementById("productsCount").innerText=productsSnap.size;
document.getElementById("totalRevenue").innerText=revenue;

document.getElementById("orders").innerHTML=ordersHTML;
document.getElementById("products").innerHTML=productsHTML;
}

window.addProduct = async function(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;

await addDoc(collection(db,"products"),{
name,price:Number(price)
});

load();
}

window.delOrder = async function(id){
await deleteDoc(doc(db,"orders",id));
load();
}

window.delProduct = async function(id){
await deleteDoc(doc(db,"products",id));
load();
}

load();

</script>

</body>
    </html>
