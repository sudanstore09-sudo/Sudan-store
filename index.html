<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena TopUp | شحن جواهر فوري</title>

<style>
body{
    margin:0;
    font-family:Arial;
    direction:rtl;
    background:#0b0f1a;
    color:#fff;
}

/* ===== HEADER ===== */
header{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
    text-align:center;
    position:relative;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#facc15;
}

.logo span{color:#38bdf8;}

/* ===== HERO ===== */
.hero{
    text-align:center;
    padding:30px 15px;
}

.hero h1{
    font-size:24px;
    margin-bottom:10px;
}

.hero p{
    color:#cbd5e1;
}

/* ===== BUTTON ===== */
.btn{
    display:inline-block;
    padding:12px 20px;
    margin-top:10px;
    background:#22c55e;
    color:#fff;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

/* ===== TIMER ===== */
.timer{
    background:#111827;
    padding:10px;
    margin:15px;
    border-radius:10px;
    color:#facc15;
    text-align:center;
}

/* ===== PRODUCTS ===== */
.products{
    padding:10px;
}

.item{
    background:#111827;
    margin:10px;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.add{
    background:#ef4444;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

/* ===== CART ===== */
.cart{
    background:#0f172a;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

/* ===== REVIEWS ===== */
.review{
    background:#111827;
    margin:10px;
    padding:10px;
    border-radius:10px;
    font-size:14px;
    color:#d1d5db;
}

/* ===== FLOAT BUTTON ===== */
.float{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    padding:15px;
    border-radius:50px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<div class="logo">🎮 Arena <span>TopUp</span></div>
<p>شحن جواهر فري فاير فوري 🔥</p>
</header>

<div class="hero">
<h1>اشحن جواهرك الآن بسرعة وأمان 💎</h1>
<p>دعم مباشر + أسعار مناسبة + شحن فوري</p>
<a class="btn" href="https://wa.me/201035179385">اطلب الآن واتساب</a>
</div>

<!-- TIMER -->
<div class="timer">
🔥 العرض ينتهي خلال: <span id="time"></span>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h3>🛒 السلة</h3>

<div id="cartList">لا توجد عناصر</div>

<select id="pay">
<option>فودافون كاش</option>
<option>بنكك</option>
</select>

<input id="uid" placeholder="ID اللاعب">
<input id="note" placeholder="ملاحظات">

<a class="btn" id="send" href="#">إرسال الطلب</a>
</div>

<!-- REVIEWS -->
<div class="review">⭐⭐⭐⭐⭐ خدمة سريعة جدًا 👍</div>
<div class="review">⭐⭐⭐⭐⭐ أفضل سعر جربته 🔥</div>
<div class="review">⭐⭐⭐⭐⭐ تم الشحن خلال دقائق 💎</div>

<a class="float" href="https://wa.me/201035179385">واتساب 💬</a>

<script>

/* ====== ⭐ تعديل الأسعار من هنا فقط ====== */
const PRODUCTS = [
 {name:"110 جوهرة", price:55},
 {name:"231 جوهرة", price:115},
 {name:"583 جوهرة", price:280},
 {name:"1180 جوهرة", price:550}
];

let cart=[];

/* ====== عرض المنتجات ====== */
function load(){
 let html="";
 PRODUCTS.forEach((p,i)=>{
 html+=`
 <div class="item">
 <div>${p.name} - 💰 ${p.price} EGP</div>
 <div class="add" onclick="add(${i})">إضافة</div>
 </div>`;
 });
 document.getElementById("products").innerHTML=html;
}
load();

/* ====== إضافة للسلة ====== */
function add(i){
 cart.push(PRODUCTS[i]);
 update();
}

function update(){
 let text="";
 let total=0;

 cart.forEach(c=>{
 text+=c.name+"<br>";
 total+=c.price;
 });

 document.getElementById("cartList").innerHTML=
 text || "لا توجد عناصر";

 let msg=`طلب جديد:
${text}
الإجمالي: ${total} EGP
ID: ${document.getElementById("uid").value}
ملاحظات: ${document.getElementById("note").value}`;

 document.getElementById("send").href=
 "https://wa.me/201035179385?text="+encodeURIComponent(msg);
}

/* ====== عداد ====== */
let t=24*60*60;
setInterval(()=>{
 let h=Math.floor(t/3600);
 let m=Math.floor((t%3600)/60);
 let s=t%60;
 document.getElementById("time").innerText=`${h}:${m}:${s}`;
 t--;
},1000);

</script>

</body>
</html>
