<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sudan-Store PRO</title>

<style>
body{
    font-family:'Tajawal',sans-serif;
    direction:rtl;
    margin:0;
    background:#f4f4f4;
    overflow-x:hidden;
}

header{
    background:linear-gradient(45deg,#e10600,#000,#009739);
    color:#fff;
    text-align:center;
    padding:25px 0;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

header h1{margin:0;font-size:34px;font-weight:800;}
header h1::before{content:"🛒 ";}

.control-box{
    width:90%;
    margin:15px auto;
    background:#fff;
    padding:12px;
    border-radius:14px;
    box-shadow:0 0 10px #0002;
}

.item{
    width:90%;
    background:#fff;
    margin:12px auto;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 10px #0001;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.add{
    background:#e10600;
    color:white;
    border-radius:10px;
    padding:7px 15px;
    cursor:pointer;
}

.cart-box{
    width:90%;
    background:white;
    margin:25px auto;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 8px #0002;
}

.cart-total{
    font-size:18px;
    color:#009739;
    font-weight:bold;
}

input,select{
    width:100%;
    margin-top:8px;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.whatsapp-btn{
    width:100%;
    background:#25D366;
    color:white;
    padding:12px;
    font-size:18px;
    border-radius:12px;
    margin-top:10px;
    text-align:center;
    display:block;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Sudan-Store PRO</h1>
<div>شحن ألعاب فوري وآمن</div>
</header>

<div class="item">
<span>110 جوهرة</span>
<span class="add" onclick="addToCart('110 جوهرة',3600)">إضافة</span>
</div>

<div class="item">
<span>231 جوهرة</span>
<span class="add" onclick="addToCart('231 جوهرة',7500)">إضافة</span>
</div>

<div class="item">
<span>583 جوهرة</span>
<span class="add" onclick="addToCart('583 جوهرة',18000)">إضافة</span>
</div>

<div class="cart-box">

<h3>🛒 السلة</h3>

<div id="list">لا يوجد عناصر</div>

<input id="playerID" placeholder="Player ID">
<input id="notes" placeholder="ملاحظات">

<select id="pay">
<option>بنكك</option>
<option>فوري</option>
<option>أوكاش</option>
</select>

<a class="whatsapp-btn" onclick="sendOrder()">إرسال الطلب</a>

</div>

<script>
let cart = [];

// إضافة للسلة
function addToCart(name,price){
    cart.push({name,price});
    render();
}

// عرض السلة
function render(){
    let html="";
    cart.forEach(i=>{
        html += `• ${i.name} - ${i.price} SDG<br>`;
    });
    document.getElementById("list").innerHTML = html || "لا يوجد عناصر";
}

// إرسال الطلب
async function sendOrder(){

    let id = document.getElementById("playerID").value.trim();
    let pay = document.getElementById("pay").value;
    let notes = document.getElementById("notes").value.trim();

    if(cart.length === 0){
        alert("السلة فارغة");
        return;
    }

    if(!id){
        alert("اكتب Player ID");
        return;
    }

    let total = cart.reduce((a,b)=>a+b.price,0);

    let message = "طلب جديد:\n";

    cart.forEach(c=>{
        message += `${c.name} - ${c.price}\n`;
    });

    message += `\nID: ${id}\nطريقة الدفع: ${pay}\nالإجمالي: ${total}`;

    window.open("https://wa.me/201035179385?text="+encodeURIComponent(message));

    // Firebase save (optional)
    if(window.saveOrder){
        await saveOrder({
            items: cart,
            playerID: id,
            payment: pay,
            notes: notes,
            total: total,
            status: "new",
            createdAt: new Date().toISOString()
        });
    }

    cart = [];
    render();
    alert("تم إرسال الطلب بنجاح ✅");
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "arenatopup09.firebaseapp.com",
  projectId: "arenatopup09",
  storageBucket: "arenatopup09.appspot.com",
  messagingSenderId: "26967872918",
  appId: "1:26967872918:web:da333cb50f309922b579b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveOrder = async function(order){
    await addDoc(collection(db,"orders"), order);
}
</script>

</body>
</html>
