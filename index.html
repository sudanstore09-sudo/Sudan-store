<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arena TopUp | شحن ألعاب فوري</title>

<meta name="description" content="متجر Arena TopUp لشحن الألعاب - جواهر فري فاير وببجي بسرعة وأمان وأسعار مناسبة">
<meta name="keywords" content="شحن فري فاير, جواهر, ببجي, شحن ألعاب, Arena TopUp">
<meta name="author" content="Arena TopUp">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Tajawal',sans-serif;
    background:#0f172a;
    color:#fff;
}

/* HEADER */
header{
    background:linear-gradient(45deg,#111827,#1f2937);
    padding:25px;
    text-align:center;
    border-bottom:2px solid #22c55e;
}

header h1{
    margin:0;
    font-size:32px;
    color:#22c55e;
}

header p{
    margin-top:5px;
    font-size:14px;
    color:#cbd5e1;
}

/* HERO */
.hero{
    text-align:center;
    padding:25px;
}

.hero h2{
    font-size:22px;
}

.hero span{
    color:#22c55e;
}

/* FEATURES */
.features{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:15px;
}

.feature{
    background:#111827;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-size:13px;
}

/* PRODUCTS */
.products{
    padding:15px;
}

.product{
    background:#111827;
    margin-bottom:10px;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #1f2937;
}

.product button{
    background:#22c55e;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* CART */
.cart{
    background:#111827;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
}

a.btn{
    display:block;
    text-align:center;
    margin-top:10px;
    padding:10px;
    background:#22c55e;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:15px;
    font-size:12px;
    color:#64748b;
}
</style>

</head>

<body>

<header>
<h1>🎮 Arena TopUp</h1>
<p>شحن ألعاب فوري - آمن - سريع</p>
</header>

<div class="hero">
<h2>أفضل متجر لشحن <span>الجواهر والألعاب</span></h2>
</div>

<div class="features">
<div class="feature">⚡ شحن فوري</div>
<div class="feature">🔒 آمن 100%</div>
<div class="feature">💎 أسعار مناسبة</div>
<div class="feature">🎧 دعم 24/7</div>
</div>

<div class="products">
<div class="product">
<span>110 جوهرة</span>
<button onclick="add('110 جوهرة',55)">إضافة</button>
</div>

<div class="product">
<span>231 جوهرة</span>
<button onclick="add('231 جوهرة',115)">إضافة</button>
</div>

<div class="product">
<span>583 جوهرة</span>
<button onclick="add('583 جوهرة',280)">إضافة</button>
</div>
</div>

<div class="cart">
<h3>🛒 السلة</h3>

<div id="list">لا يوجد عناصر</div>

<input id="id" placeholder="Player ID">
<select id="pay">
<option>بنكك</option>
<option>فوري</option>
<option>أوكاش</option>
</select>

<a class="btn" onclick="send()">إرسال الطلب</a>
</div>

<footer>
© Arena TopUp - جميع الحقوق محفوظة
</footer>

<script>
let cart=[];

function add(name,price){
cart.push({name,price});
render();
}

function render(){
let list="";
cart.forEach(c=>{
list+=`• ${c.name} - ${c.price}$<br>`;
});
document.getElementById("list").innerHTML=list || "لا يوجد عناصر";
}

function send(){
let id=document.getElementById("id").value;
let pay=document.getElementById("pay").value;

let msg="طلب جديد:\n";

cart.forEach(c=>{
msg+=`${c.name} - ${c.price}\n`;
});

msg+=`\nID: ${id}\nطريقة الدفع: ${pay}`;

window.open("https://wa.me/201035179385?text="+encodeURIComponent(msg));
}
</script>
<script type="module">
import { db, collection, addDoc } from "./firebase.js";
</body>
</html>
