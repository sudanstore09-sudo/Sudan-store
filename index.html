<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arena TopUp | شحن الألعاب بأمان وسرعة</title>

<meta name="description" content="متجر Arena TopUp لشحن الألعاب مثل فري فاير وببجي بأفضل الأسعار وسرعة تسليم فورية">
<meta name="keywords" content="شحن فري فاير, شحن جواهر, ببجي, ألعاب, شحن ألعاب">
<meta name="author" content="Arena TopUp">

<style>
body{
    font-family:'Tajawal',sans-serif;
    margin:0;
    direction:rtl;
    background:#0f172a;
    color:#fff;
}

header{
    background:linear-gradient(45deg,#111827,#1f2937);
    text-align:center;
    padding:25px;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.sub{
    font-size:13px;
    color:#cbd5e1;
}

.container{
    width:92%;
    margin:auto;
}

.item{
    background:#111827;
    margin:10px 0;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.price{color:#22c55e;}

button{
    background:#ef4444;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.cart{
    background:#1f2937;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
}

input,select{
    width:100%;
    margin-top:8px;
    padding:10px;
    border-radius:8px;
    border:none;
}

.whatsapp{
    background:#25D366;
    display:block;
    text-align:center;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    color:#fff;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<div class="logo">🎮 Arena TopUp</div>
<div class="sub">⚡ شحن فوري - 🔒 آمن - 💎 أسعار منافسة</div>
</header>

<div class="container">

<h3>📦 المنتجات</h3>
<div id="products"></div>

<div class="cart">
<h3>🛒 السلة</h3>

<div id="cart"></div>

<select id="pay">
<option>فودافون كاش</option>
<option>بنكك</option>
<option>تحويل بنكي</option>
</select>

<input id="uid" placeholder="ID اللاعب">
<input id="note" placeholder="ملاحظات">

<a class="whatsapp" id="send">إرسال الطلب واتساب</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "arenatopup09.firebaseapp.com",
  projectId: "arenatopup09",
  storageBucket: "arenatopup09.firebasestorage.app",
  messagingSenderId: "26967872918",
  appId: "1:26967872918:web:da333cb50f309922b579b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

const products = [
{name:"110 جوهرة", price:55},
{name:"231 جوهرة", price:115},
{name:"583 جوهرة", price:280},
{name:"1180 جوهرة", price:550}
];

// VISITS
let v = localStorage.getItem("visits") || 0;
v++;
localStorage.setItem("visits", v);

// render
function render(){
let html="";
products.forEach((p,i)=>{
html += `
<div class="item">
<span>${p.name}</span>
<span class="price">${p.price} EGP</span>
<button onclick="add(${i})">إضافة</button>
</div>`;
});
document.getElementById("products").innerHTML = html;
}
render();

window.add = function(i){
cart.push(products[i]);
update();
}

function update(){

let html="";
let total=0;

cart.forEach(c=>{
html += `<div>${c.name}</div>`;
total += c.price;
});

document.getElementById("cart").innerHTML =
html + `<hr>الإجمالي: ${total}`;

let msg = `
طلب جديد:
${cart.map(c=>c.name).join("\n")}
الإجمالي: ${total}
`;

document.getElementById("send").href =
`https://wa.me/201035179385?text=${encodeURIComponent(msg)}`;

}

// SAVE ORDER FIREBASE
window.sendOrder = async function(){

await addDoc(collection(db,"orders"),{
cart,
uid:document.getElementById("uid").value,
note:document.getElementById("note").value,
time:new Date()
});

alert("تم إرسال الطلب 🚀");
}

window.addEventListener("beforeunload", ()=>{
localStorage.setItem("visits",v);
});

</script>

</body>
</html>
